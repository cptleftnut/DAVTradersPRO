<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Global error handlers inside capture phase to completely intercept and silence "Script error" and "ResizeObserver" issues
      window.addEventListener('error', function(e) {
        const msg = e.message || '';
        if (typeof msg === 'string' && (msg.includes('Script error') || msg.includes('ResizeObserver') || msg.includes('Failed to fetch'))) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        const msg = (e.reason && e.reason.message) || e.reason || '';
        if (typeof msg === 'string' && (msg.includes('Script error') || msg.includes('ResizeObserver') || msg.includes('Failed to fetch'))) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);

      window.onerror = function(msg) {
        if (typeof msg === 'string' && (msg.includes('Script error') || msg.includes('ResizeObserver') || msg.includes('Failed to fetch'))) {
          return true;
        }
      };

      const originalError = console.error;
      console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('Script error') || args[0].includes('ResizeObserver') || args[0].includes('Failed to fetch'))) return;
          originalError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
