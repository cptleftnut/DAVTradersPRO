version: 2

updates:
  # Node.js dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    reviewers:
      - cptleftnut
    assignees:
      - cptleftnut
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 5
    reviewers:
      - cptleftnut
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
